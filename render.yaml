services:
  - type: worker
    name: gojo-userbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: BOT_NAME
        sync: false
      - key: BOT_CHANNEL
        sync: false
