services:
  - type: web
    name: gojo-userbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -u main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: BOT_NAME
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
